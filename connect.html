<html>
<head>
<link rel="stylesheet" href="https://eiskrice.github.io/style.css">
<title>e-Iskrice Connect [BETA]</title>
  <h1><b>e-Iskrice Connect [BETA]</b></h1>
  <p><h2>Lokacija nalepk:</h2>
</head>
<body>
  <div id="map" style="width:100%;height:500px"></div>

<script>
function myMap() {
  var myCenter = new google.maps.LatLng(46.0421981,14.5093858);
  var mapCanvas = document.getElementById("map");
  var mapOptions = {center: myCenter, zoom: 17};
  var map = new google.maps.Map(mapCanvas, mapOptions);
  var marker = new google.maps.Marker({position:myCenter});
  marker.setMap(map);

  var infowindow = new google.maps.InfoWindow({
    content: "'Osnovna Šola Prule' 1x e-Iskrice Connect Nalepka"
  });
  infowindow.open(map,marker);
}
</script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDxxn4TLkETULFdWczlxmWqpPh2INm3WEU&callback=myMap"></script>
</body>
</html>
